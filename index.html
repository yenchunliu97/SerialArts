<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shape Preference Survey</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 30px;
      background: #faf7f0;
      color: #333;
    }

    h2 { margin-bottom: 5px; }

    .survey {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 70px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .panel { text-align: center; }

    .canvas {
      position: relative;
      width: 420px;
      height: 520px;
      background: #fffdf8;
      border: 2px solid #ddd0c0;
      border-radius: 16px;
      cursor: pointer;
      overflow: hidden;
      transition: border-color 0.12s, transform 0.12s;
    }

    .canvas:hover {
      border-color: #8c7a66;
      transform: translateY(-2px);
    }

    .canvas.disabled {
      pointer-events: none;
      opacity: 0.72;
    }

    .piece {
      position: absolute;
      height: auto;
      user-select: none;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    #progress {
      margin-top: 20px;
      font-size: 16px;
    }

    #status {
      min-height: 22px;
      margin-top: 8px;
      color: #6b6259;
      font-size: 14px;
    }

    .completion {
      margin: 100px auto;
      max-width: 600px;
      padding: 40px;
      background: #fffdf8;
      border: 2px solid #ddd0c0;
      border-radius: 16px;
    }

    .retry-button {
      margin-top: 16px;
      padding: 10px 18px;
      border: 1px solid #aaa;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 15px;
    }

    @media (max-width: 950px) {
      body { margin: 16px; }
      .survey { gap: 28px; }
    }
  </style>
</head>

<body>
  <h2>Which shape looks more like a swan?</h2>
  <p>Click the left or right image.</p>

  <div class="survey">
    <div class="panel">
      <h3>Left</h3>
      <div id="leftDesign" class="canvas" role="button" tabindex="0"
           aria-label="Choose the left design"></div>
    </div>

    <div class="panel">
      <h3>Right</h3>
      <div id="rightDesign" class="canvas" role="button" tabindex="0"
           aria-label="Choose the right design"></div>
    </div>
  </div>

  <p id="progress"></p>
  <p id="status"></p>

/* =====================================================
   5. Survey assignment
   ===================================================== */

const surveyIds = Object.keys(surveyProfiles);
const requestedSurvey =
  new URLSearchParams(window.location.search).get("survey");

let assignedSurvey = sessionStorage.getItem("assigned_survey");

if (requestedSurvey && surveyProfiles[requestedSurvey]) {
  assignedSurvey = requestedSurvey;
  sessionStorage.setItem("assigned_survey", assignedSurvey);
} else if (!assignedSurvey || !surveyProfiles[assignedSurvey]) {
  assignedSurvey =
    surveyIds[Math.floor(Math.random() * surveyIds.length)];
  sessionStorage.setItem("assigned_survey", assignedSurvey);
}


/* =====================================================
   6. Build 20 comparisons and randomize left/right once
   ===================================================== */

function buildComparisons() {
  return surveyProfiles[assignedSurvey].map(
    ([firstLabel, secondLabel]) => {
      const swap = Math.random() < 0.5;
      const leftLabel = swap ? secondLabel : firstLabel;
      const rightLabel = swap ? firstLabel : secondLabel;

      return {
        leftLabel,
        rightLabel,
        leftDesign: designMap[leftLabel],
        rightDesign: designMap[rightLabel]
      };
    }
  );
}

let comparisons = null;

try {
  comparisons = JSON.parse(sessionStorage.getItem(comparisonStorageKey));
} catch (error) {
  comparisons = null;
}

const validComparisons =
  Array.isArray(comparisons) &&
  comparisons.length === 20 &&
  comparisons.every(pair =>
    pair &&
    pair.leftLabel &&
    pair.rightLabel &&
    pair.leftDesign &&
    pair.rightDesign
  );

if (!validComparisons) {
  comparisons = buildComparisons();
  sessionStorage.setItem(
    comparisonStorageKey,
    JSON.stringify(comparisons)
  );
}


/* =====================================================
   7. Restore progress if page refreshes
   ===================================================== */

let responses = [];

try {
  responses =
    JSON.parse(sessionStorage.getItem("survey_responses_fast_v1")) || [];
} catch (error) {
  responses = [];
}

let trial = responses.length;

if (!Number.isInteger(trial) || trial < 0 || trial > comparisons.length) {
  responses = [];
  trial = 0;
  sessionStorage.removeItem("survey_responses_fast_v1");
}

let submitting = false;


/* =====================================================
   8. Preload all seven images for fast display
   ===================================================== */

const imageCache = {};

function preloadImages() {
  return Promise.all(
    Object.keys(pieceWidths).map(pieceId => {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve();
        img.onerror = () => {
          console.error("Could not load image:", img.src);
          resolve();
        };
        img.src = `${pieceFolder}/${pieceId}.png`;
        imageCache[pieceId] = img;
      });
    })
  );
}


/* =====================================================
   9. Draw one design
   ===================================================== */

function drawDesign(containerId, designString) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";

  if (!designString || designString.length !== positions.length) {
    container.textContent = "Design could not be loaded.";
    return;
  }

  for (let pos = 0; pos < designString.length; pos++) {
    const pieceId = designString[pos];
    const location = positions[pos];
    const sourceImage = imageCache[pieceId];

    const img = sourceImage
      ? sourceImage.cloneNode()
      : document.createElement("img");

    if (!sourceImage) {
      img.src = `${pieceFolder}/${pieceId}.png`;
    }

    img.alt = "";
    img.className = "piece";
    img.draggable = false;
    img.style.left = location.x + "px";
    img.style.top = location.y + "px";
    img.style.width = pieceWidths[pieceId] + "px";

    container.appendChild(img);
  }
}


/* =====================================================
   10. Display current comparison
   ===================================================== */

function setCanvasesDisabled(disabled) {
  document.getElementById("leftDesign")
    .classList.toggle("disabled", disabled);
  document.getElementById("rightDesign")
    .classList.toggle("disabled", disabled);
}

function showTrial() {
  if (trial >= comparisons.length) {
    submitAllResponses();
    return;
  }

  const pair = comparisons[trial];

  drawDesign("leftDesign", pair.leftDesign);
  drawDesign("rightDesign", pair.rightDesign);

  document.getElementById("progress").textContent =
    `Question ${trial + 1} of ${comparisons.length}`;

  document.getElementById("status").textContent = "";
  setCanvasesDisabled(false);
}


/* =====================================================
   11. Save choice locally and move instantly
   ===================================================== */

function submitChoice(preference) {
  if (submitting || trial >= comparisons.length) return;

  const pair = comparisons[trial];

  responses.push({
    survey_id: assignedSurvey,
    participant_id,
    left_label: pair.leftLabel,
    right_label: pair.rightLabel,
    left_design: pair.leftDesign,
    right_design: pair.rightDesign,
    preference
  });

  sessionStorage.setItem(
    "survey_responses_fast_v1",
    JSON.stringify(responses)
  );

  trial++;

  if (trial >= comparisons.length) {
    submitAllResponses();
  } else {
    showTrial();
  }
}


/* =====================================================
   12. Send all 20 rows to Google Sheets once
   ===================================================== */

async function submitAllResponses() {
  if (submitting) return;
  submitting = true;

  document.body.innerHTML = `
    <div class="completion">
      <h2>Saving your responses...</h2>
      <p>Please do not close this page.</p>
    </div>
  `;

  try {
    await fetch(GOOGLE_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify({
        responses
      })
    });

    sessionStorage.removeItem("survey_responses_fast_v1");
    sessionStorage.removeItem("participant_id");
    sessionStorage.removeItem("assigned_survey");
    sessionStorage.removeItem(comparisonStorageKey);

    document.body.innerHTML = `
      <div class="completion">
        <h2>Thank you!</h2>
        <p>Your responses have been recorded.</p>
      </div>
    `;

  } catch (error) {
    console.error(error);

    document.body.innerHTML = `
      <div class="completion">
        <h2>Responses could not be saved</h2>
        <p>Your answers are still stored in this browser.</p>
        <button class="retry-button" onclick="location.reload()">
          Try again
        </button>
      </div>
    `;

  } finally {
    submitting = false;
  }
}


/* =====================================================
   13. Click and keyboard controls
   ===================================================== */

document.getElementById("leftDesign").addEventListener(
  "click",
  () => submitChoice("left")
);

document.getElementById("rightDesign").addEventListener(
  "click",
  () => submitChoice("right")
);

document.getElementById("leftDesign").addEventListener(
  "keydown",
  event => {
    if (event.key === "Enter" || event.key === " ") {
      event.preventDefault();
      submitChoice("left");
    }
  }
);

document.getElementById("rightDesign").addEventListener(
  "keydown",
  event => {
    if (event.key === "Enter" || event.key === " ") {
      event.preventDefault();
      submitChoice("right");
    }
  }
);


/* =====================================================
   14. Start after images are preloaded
   ===================================================== */

document.getElementById("status").textContent = "Loading images...";

preloadImages().then(showTrial);

</script>
</body>
</html>
