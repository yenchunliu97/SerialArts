<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Visual Preference Survey</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 30px;
    }

    .survey {
      display: flex;
      justify-content: center;
      gap: 60px;
      margin-top: 30px;
    }

    .design {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 120px);
      gap: 5px;
      cursor: pointer;
      border: 4px solid transparent;
      padding: 10px;
    }

    .design:hover {
      border: 4px solid #555;
    }

    .design img {
      width: 120px;
      height: 120px;
      object-fit: cover;
    }
  </style>
</head>

<body>

<h2>Which arrangement do you prefer?</h2>
<p>Click the image arrangement you prefer.</p>

<div class="survey">
  <div>
    <h3>Left</h3>
    <div id="leftDesign" class="design" onclick="submitChoice('left')"></div>
  </div>

  <div>
    <h3>Right</h3>
    <div id="rightDesign" class="design" onclick="submitChoice('right')"></div>
  </div>
</div>

<p id="progress"></p>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxPQlehjmHvwBka8R6lnIC10MS_lHl75TwVw8pdt6DqaqeyIwusAelCfAWAnBcmYo7T/exec";

const participant_id = crypto.randomUUID();

const comparisons = [
  ["123456789", "987654321"],
  ["132456789", "213456789"],
  ["456789123", "789123456"]
];

let trial = 0;

function drawDesign(containerId, designString) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";

  for (const digit of designString) {
    const img = document.createElement("img");
    img.src = `images/${digit}.png`;
    container.appendChild(img);
  }
}

function showTrial() {
  if (trial >= comparisons.length) {
    document.body.innerHTML = "<h2>Thank you!</h2><p>Your responses have been recorded.</p>";
    return;
  }

  const [left, right] = comparisons[trial];

  drawDesign("leftDesign", left);
  drawDesign("rightDesign", right);

  document.getElementById("progress").innerText =
    `Question ${trial + 1} of ${comparisons.length}`;
}

function submitChoice(choice) {
  const [left, right] = comparisons[trial];

  fetch(GOOGLE_SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      participant_id: participant_id,
      trial_id: trial + 1,
      left_design: left,
      right_design: right,
      preference: choice
    })
  });

  trial++;
  showTrial();
}

showTrial();
</script>

</body>
</html>
